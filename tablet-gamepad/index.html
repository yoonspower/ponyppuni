<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>터치 게이밍 패드</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  background: #000;
  font-family: -apple-system, 'Malgun Gothic', sans-serif;
}

/* ── 게임 영역 (iframe이나 게임 콘텐츠가 들어갈 곳) ── */
#game-area {
  position: fixed; inset: 0;
  background: #111;
  z-index: 0;
}
#game-area iframe {
  width: 100%; height: 100%;
  border: none;
}
#game-placeholder {
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: rgba(255,255,255,0.3);
}
#game-placeholder .ph-icon { font-size: 48px; }
#game-placeholder .ph-text { font-size: 16px; font-weight: 600; }
#game-placeholder .ph-sub { font-size: 12px; color: rgba(255,255,255,0.15); }
#url-input-wrap {
  display: flex; gap: 8px; margin-top: 8px;
}
#url-input {
  width: 300px; padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: #fff; font-size: 13px;
  outline: none;
}
#url-input::placeholder { color: rgba(255,255,255,0.25); }
#url-input:focus { border-color: rgba(100,160,255,0.5); }
#url-go {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: rgba(100,140,255,0.3);
  color: rgba(200,220,255,0.9);
  font-size: 13px; font-weight: 700;
  cursor: pointer;
}

/* ── 오버레이 (게임 위에 반투명으로 떠있는 패드) ── */
#overlay {
  position: fixed; inset: 0;
  z-index: 10;
  pointer-events: none;
}
#overlay * {
  pointer-events: auto;
}

/* ── 투명도 조절: 기본 흐릿하게, 터치 시 살짝 밝아짐 ── */
.pad-element {
  opacity: 0.25;
  transition: opacity 0.2s;
}
.pad-element:active, .pad-element.active {
  opacity: 0.6;
}

/* ── 왼쪽: 아날로그 조이스틱 ── */
#left-zone {
  position: fixed;
  left: 30px;
  bottom: 30px;
  width: 180px;
  height: 180px;
}
#joystick-base {
  position: absolute;
  width: 180px; height: 180px;
  left: 0; top: 0;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.04) 60%, transparent 100%);
  border: 2px solid rgba(255,255,255,0.2);
}
#joystick-thumb {
  position: absolute;
  width: 64px; height: 64px;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.5), rgba(255,255,255,0.2));
  border: 2px solid rgba(255,255,255,0.35);
  box-shadow: 0 0 15px rgba(255,255,255,0.1);
  transition: box-shadow 0.15s;
}
#joystick-thumb.active {
  box-shadow: 0 0 25px rgba(255,255,255,0.25);
}

/* 방향 표시 */
.dir-indicator {
  position: absolute;
  color: rgba(255,255,255,0.1);
  font-size: 18px;
  font-weight: 900;
  pointer-events: none;
}
.dir-indicator.up    { top: 10px; left: 50%; transform: translateX(-50%); }
.dir-indicator.down  { bottom: 10px; left: 50%; transform: translateX(-50%); }
.dir-indicator.left  { left: 14px; top: 50%; transform: translateY(-50%); }
.dir-indicator.right { right: 14px; top: 50%; transform: translateY(-50%); }
.dir-indicator.active { color: rgba(255,255,255,0.6); }

/* ── 오른쪽: ABXY 버튼 ── */
#right-zone {
  position: fixed;
  right: 30px;
  bottom: 30px;
  width: 170px;
  height: 170px;
}
.action-btn {
  position: absolute;
  width: 58px; height: 58px;
  border-radius: 50%;
  border: 2px solid;
  font-size: 18px;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
  color: #fff;
}
.action-btn.btn-a {
  bottom: 0; left: 50%; transform: translateX(-50%);
  background: rgba(76,175,80,0.5);
  border-color: rgba(76,175,80,0.4);
}
.action-btn.btn-b {
  right: 0; top: 50%; transform: translateY(-50%);
  background: rgba(244,67,54,0.5);
  border-color: rgba(244,67,54,0.4);
}
.action-btn.btn-x {
  left: 0; top: 50%; transform: translateY(-50%);
  background: rgba(33,150,243,0.5);
  border-color: rgba(33,150,243,0.4);
}
.action-btn.btn-y {
  top: 0; left: 50%; transform: translateX(-50%);
  background: rgba(255,193,7,0.5);
  border-color: rgba(255,193,7,0.4);
}
.action-btn.active.btn-a { transform: translateX(-50%) scale(0.88); opacity: 0.8; }
.action-btn.active.btn-b { transform: translateY(-50%) scale(0.88); opacity: 0.8; }
.action-btn.active.btn-x { transform: translateY(-50%) scale(0.88); opacity: 0.8; }
.action-btn.active.btn-y { transform: translateX(-50%) scale(0.88); opacity: 0.8; }

/* ── 상단: L/R 트리거 ── */
#trigger-left {
  position: fixed;
  top: 12px; left: 20px;
  display: flex; gap: 10px;
}
#trigger-right {
  position: fixed;
  top: 12px; right: 20px;
  display: flex; gap: 10px;
}
.trigger-btn {
  width: 64px; height: 32px;
  border-radius: 16px;
  border: 1.5px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.5);
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.1s;
}
.trigger-btn.active {
  background: rgba(255,255,255,0.25);
  border-color: rgba(255,255,255,0.5);
  color: #fff;
}

/* ── 가운데 상단: 특수 버튼 ── */
#special-zone {
  position: fixed;
  top: 12px;
  left: 50%; transform: translateX(-50%);
  display: flex; gap: 20px;
}
.special-btn {
  width: 44px; height: 26px;
  border-radius: 13px;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.35);
  font-size: 10px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.1s;
}
.special-btn.active {
  background: rgba(255,255,255,0.2);
  border-color: rgba(255,255,255,0.4);
  color: #fff;
}

/* ── D-Pad (십자키) ── */
#dpad-zone {
  position: fixed;
  left: 240px;
  bottom: 50px;
  width: 110px;
  height: 110px;
}
.dpad-btn {
  position: absolute;
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.4);
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.1s;
}
.dpad-btn.dpad-up    { top: 0;    left: 50%; transform: translateX(-50%); border-radius: 8px 8px 3px 3px; }
.dpad-btn.dpad-down  { bottom: 0; left: 50%; transform: translateX(-50%); border-radius: 3px 3px 8px 8px; }
.dpad-btn.dpad-left  { left: 0;   top: 50%; transform: translateY(-50%); border-radius: 8px 3px 3px 8px; }
.dpad-btn.dpad-right { right: 0;  top: 50%; transform: translateY(-50%); border-radius: 3px 8px 8px 3px; }
.dpad-center {
  position: absolute;
  width: 36px; height: 36px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.03);
  border-radius: 4px;
  pointer-events: none;
}
.dpad-btn.active {
  background: rgba(255,255,255,0.25);
  border-color: rgba(255,255,255,0.5);
  color: #fff;
}

/* ── 오른쪽 하단: 추가 버튼 ── */
#extra-zone {
  position: fixed;
  right: 230px;
  bottom: 50px;
  display: flex;
  gap: 12px;
}
.extra-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.35);
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.1s;
}
.extra-btn.active {
  background: rgba(255,255,255,0.25);
  border-color: rgba(255,255,255,0.5);
  color: #fff;
}

/* ── 투명도 슬라이더 (우측 상단) ── */
#opacity-ctrl {
  position: fixed;
  top: 50px; right: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 20;
  opacity: 0.3;
  transition: opacity 0.3s;
}
#opacity-ctrl:hover, #opacity-ctrl:active { opacity: 0.8; }
#opacity-ctrl label {
  color: rgba(255,255,255,0.5);
  font-size: 11px;
}
#opacity-slider {
  width: 80px;
  accent-color: rgba(255,255,255,0.5);
}

/* ── 설정 토글 ── */
#settings-toggle {
  position: fixed;
  top: 12px; right: 180px;
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.4);
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 20;
  pointer-events: auto;
}

/* ── 설정 패널 ── */
#settings-panel {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  pointer-events: auto;
}
#settings-panel.open { display: flex; }
#settings-panel h2 {
  color: rgba(255,255,255,0.8);
  font-size: 20px;
  margin-bottom: 8px;
}
.setting-row {
  display: flex;
  align-items: center;
  gap: 12px;
  color: rgba(255,255,255,0.7);
  font-size: 14px;
}
.setting-row label { min-width: 120px; }
.setting-row input[type=range] { width: 160px; }
.setting-row select {
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.1);
  color: #fff;
  font-size: 13px;
}
.close-settings {
  margin-top: 16px;
  padding: 10px 32px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}

/* ── 가로모드 유도 ── */
@media (orientation: portrait) {
  #rotate-msg { display: flex !important; }
  #overlay, #game-area, #opacity-ctrl { display: none !important; }
}
#rotate-msg {
  display: none;
  position: fixed; inset: 0;
  background: #000;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 999;
}
#rotate-msg .icon { font-size: 56px; animation: rot 2s ease-in-out infinite; }
#rotate-msg .msg { color: rgba(255,255,255,0.7); font-size: 17px; font-weight: 700; }
#rotate-msg .sub { color: rgba(255,255,255,0.35); font-size: 12px; }
@keyframes rot {
  0%,100% { transform: rotate(0deg); }
  25%,50% { transform: rotate(90deg); }
  75% { transform: rotate(0deg); }
}
</style>
</head>
<body>

<!-- 가로모드 전환 안내 -->
<div id="rotate-msg">
  <div class="icon">📱</div>
  <div class="msg">태블릿을 가로로 돌려주세요</div>
  <div class="sub">게이밍 패드는 가로 모드에서 사용할 수 있어요</div>
</div>

<!-- 게임 영역 -->
<div id="game-area">
  <div id="game-placeholder">
    <div class="ph-icon">🎮</div>
    <div class="ph-text">게임 URL을 입력하거나 이 페이지를 iframe으로 사용하세요</div>
    <div class="ph-sub">오버레이 게임패드가 화면 위에 반투명으로 표시됩니다</div>
    <div id="url-input-wrap">
      <input type="text" id="url-input" placeholder="게임 URL 입력 (예: https://example.com/game)">
      <button id="url-go">로드</button>
    </div>
  </div>
</div>

<!-- 오버레이: 반투명 게임패드 -->
<div id="overlay">

  <!-- 왼쪽 트리거 -->
  <div id="trigger-left">
    <div class="trigger-btn pad-element" data-key="KeyQ" id="btn-l1">L1</div>
    <div class="trigger-btn pad-element" data-key="ShiftLeft" id="btn-l2">L2</div>
  </div>

  <!-- 특수 버튼 -->
  <div id="special-zone">
    <div class="special-btn pad-element" data-key="Escape" id="btn-select">SEL</div>
    <div class="special-btn pad-element" data-key="Enter" id="btn-start">STA</div>
  </div>

  <!-- 오른쪽 트리거 -->
  <div id="trigger-right">
    <div class="trigger-btn pad-element" data-key="KeyE" id="btn-r1">R1</div>
    <div class="trigger-btn pad-element" data-key="Space" id="btn-r2">R2</div>
  </div>

  <!-- 설정 버튼 -->
  <div id="settings-toggle" onclick="toggleSettings()">⚙</div>

  <!-- 왼쪽: 아날로그 조이스틱 -->
  <div id="left-zone" class="pad-element">
    <div id="joystick-base">
      <div class="dir-indicator up" id="dir-up">▲</div>
      <div class="dir-indicator down" id="dir-down">▼</div>
      <div class="dir-indicator left" id="dir-left">◀</div>
      <div class="dir-indicator right" id="dir-right">▶</div>
      <div id="joystick-thumb"></div>
    </div>
  </div>

  <!-- D-Pad -->
  <div id="dpad-zone" class="pad-element">
    <div class="dpad-center"></div>
    <div class="dpad-btn dpad-up" data-key="ArrowUp" id="dpad-up">▲</div>
    <div class="dpad-btn dpad-down" data-key="ArrowDown" id="dpad-down">▼</div>
    <div class="dpad-btn dpad-left" data-key="ArrowLeft" id="dpad-left">◀</div>
    <div class="dpad-btn dpad-right" data-key="ArrowRight" id="dpad-right">▶</div>
  </div>

  <!-- 오른쪽: ABXY -->
  <div id="right-zone" class="pad-element">
    <div class="action-btn btn-a" data-key="KeyJ" id="btn-a">A</div>
    <div class="action-btn btn-b" data-key="KeyL" id="btn-b">B</div>
    <div class="action-btn btn-x" data-key="KeyU" id="btn-x">X</div>
    <div class="action-btn btn-y" data-key="KeyI" id="btn-y">Y</div>
  </div>

  <!-- 추가 버튼 -->
  <div id="extra-zone" class="pad-element">
    <div class="extra-btn" data-key="KeyR" id="btn-r3">R3</div>
    <div class="extra-btn" data-key="KeyF" id="btn-l3">L3</div>
  </div>
</div>

<!-- 투명도 슬라이더 -->
<div id="opacity-ctrl">
  <label>투명도</label>
  <input type="range" id="opacity-slider" min="0.1" max="0.8" step="0.05" value="0.25">
</div>

<!-- 설정 패널 -->
<div id="settings-panel">
  <h2>게임패드 설정</h2>

  <div class="setting-row">
    <label>조이스틱 감도</label>
    <input type="range" id="set-sens" min="0.3" max="1.5" step="0.1" value="1.0">
    <span id="sens-val">1.0</span>
  </div>

  <div class="setting-row">
    <label>버튼 크기</label>
    <select id="set-size">
      <option value="small">작게</option>
      <option value="medium" selected>보통</option>
      <option value="large">크게</option>
    </select>
  </div>

  <button class="close-settings" onclick="toggleSettings()">닫기</button>
</div>

<script>
// ── 설정 ──
var config = {
  sensitivity: 1.0,
  padOpacity: 0.25,
  buttonScale: 1.0
};

// ── 게임 URL 로드 ──
document.getElementById('url-go').addEventListener('click', function() {
  var url = document.getElementById('url-input').value.trim();
  if (!url) return;
  if (!/^https?:\/\//.test(url)) url = 'https://' + url;
  var area = document.getElementById('game-area');
  area.innerHTML = '<iframe src="' + url + '" allow="fullscreen; autoplay" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>';
});
document.getElementById('url-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('url-go').click();
});

// ── 키보드 이벤트 시뮬레이션 ──
function fireKey(code, type) {
  var evType = type === 'down' ? 'keydown' : 'keyup';
  var key = codeToKey(code);
  document.dispatchEvent(new KeyboardEvent(evType, {
    code: code, key: key, bubbles: true, cancelable: true
  }));
}

function codeToKey(code) {
  var map = {
    'ArrowUp':'ArrowUp','ArrowDown':'ArrowDown','ArrowLeft':'ArrowLeft','ArrowRight':'ArrowRight',
    'KeyW':'w','KeyA':'a','KeyS':'s','KeyD':'d',
    'KeyJ':'j','KeyK':'k','KeyL':'l','KeyI':'i','KeyU':'u',
    'KeyQ':'q','KeyE':'e','KeyR':'r','KeyF':'f',
    'Space':' ','Enter':'Enter','Escape':'Escape','ShiftLeft':'Shift'
  };
  return map[code] || code;
}

// ── 버튼 터치 처리 ──
function setupButton(el) {
  if (!el || !el.dataset.key) return;

  el.addEventListener('touchstart', function(e) {
    e.preventDefault();
    el.classList.add('active');
    fireKey(el.dataset.key, 'down');
  }, { passive: false });

  el.addEventListener('touchend', function(e) {
    e.preventDefault();
    el.classList.remove('active');
    fireKey(el.dataset.key, 'up');
  }, { passive: false });

  el.addEventListener('touchcancel', function() {
    el.classList.remove('active');
    fireKey(el.dataset.key, 'up');
  });
}

var allButtons = document.querySelectorAll('.action-btn, .trigger-btn, .special-btn, .dpad-btn, .extra-btn');
for (var i = 0; i < allButtons.length; i++) {
  setupButton(allButtons[i]);
}

// ── 조이스틱 ──
var joyBase = document.getElementById('joystick-base');
var joyThumb = document.getElementById('joystick-thumb');
var joyActive = false;
var joyTouchId = null;
var joyCenter = { x: 0, y: 0 };
var joyRadius = 55;
var currentJoyKeys = { up: false, down: false, left: false, right: false };
var joyKeyMap = { up: 'KeyW', down: 'KeyS', left: 'KeyA', right: 'KeyD' };

function getJoyCenter() {
  var rect = joyBase.getBoundingClientRect();
  return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
}

joyBase.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (joyActive) return;
  var t = e.changedTouches[0];
  joyActive = true;
  joyTouchId = t.identifier;
  joyCenter = getJoyCenter();
  joyThumb.classList.add('active');
  document.getElementById('left-zone').style.opacity = '0.6';
  updateJoystick(t.clientX, t.clientY);
}, { passive: false });

document.addEventListener('touchmove', function(e) {
  if (!joyActive) return;
  for (var i = 0; i < e.changedTouches.length; i++) {
    if (e.changedTouches[i].identifier === joyTouchId) {
      e.preventDefault();
      updateJoystick(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
      break;
    }
  }
}, { passive: false });

document.addEventListener('touchend', function(e) {
  if (!joyActive) return;
  for (var i = 0; i < e.changedTouches.length; i++) {
    if (e.changedTouches[i].identifier === joyTouchId) {
      resetJoystick();
      break;
    }
  }
});
document.addEventListener('touchcancel', function() { if (joyActive) resetJoystick(); });

function updateJoystick(tx, ty) {
  var dx = (tx - joyCenter.x) * config.sensitivity;
  var dy = (ty - joyCenter.y) * config.sensitivity;
  var dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > joyRadius) {
    dx = dx / dist * joyRadius;
    dy = dy / dist * joyRadius;
  }

  joyThumb.style.left = 'calc(50% + ' + dx + 'px)';
  joyThumb.style.top = 'calc(50% + ' + dy + 'px)';

  var deadzone = joyRadius * 0.2;
  var newKeys = {
    up: dy < -deadzone,
    down: dy > deadzone,
    left: dx < -deadzone,
    right: dx > deadzone
  };

  document.getElementById('dir-up').classList.toggle('active', newKeys.up);
  document.getElementById('dir-down').classList.toggle('active', newKeys.down);
  document.getElementById('dir-left').classList.toggle('active', newKeys.left);
  document.getElementById('dir-right').classList.toggle('active', newKeys.right);

  for (var dir in newKeys) {
    if (newKeys[dir] && !currentJoyKeys[dir]) {
      fireKey(joyKeyMap[dir], 'down');
    } else if (!newKeys[dir] && currentJoyKeys[dir]) {
      fireKey(joyKeyMap[dir], 'up');
    }
  }
  currentJoyKeys = newKeys;
}

function resetJoystick() {
  joyActive = false;
  joyTouchId = null;
  joyThumb.classList.remove('active');
  joyThumb.style.left = '50%';
  joyThumb.style.top = '50%';
  document.getElementById('left-zone').style.opacity = '';

  for (var dir in currentJoyKeys) {
    if (currentJoyKeys[dir]) fireKey(joyKeyMap[dir], 'up');
    document.getElementById('dir-' + dir).classList.remove('active');
  }
  currentJoyKeys = { up: false, down: false, left: false, right: false };
}

// ── 투명도 슬라이더 ──
document.getElementById('opacity-slider').addEventListener('input', function() {
  config.padOpacity = parseFloat(this.value);
  var els = document.querySelectorAll('.pad-element');
  for (var i = 0; i < els.length; i++) {
    els[i].style.opacity = config.padOpacity;
  }
});

// ── 설정 패널 ──
function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('open');
}

document.getElementById('set-sens').addEventListener('input', function() {
  config.sensitivity = parseFloat(this.value);
  document.getElementById('sens-val').textContent = config.sensitivity.toFixed(1);
});

document.getElementById('set-size').addEventListener('change', function() {
  var scale = { small: 0.8, medium: 1.0, large: 1.2 }[this.value] || 1.0;
  config.buttonScale = scale;
  document.getElementById('right-zone').style.transform = 'scale(' + scale + ')';
  document.getElementById('left-zone').style.transform = 'scale(' + scale + ')';
  document.getElementById('dpad-zone').style.transform = 'scale(' + scale + ')';
});

// ── 전체 화면 ──
document.addEventListener('dblclick', function() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(function() {});
  } else {
    document.exitFullscreen();
  }
});

// ── 기본 동작 방지 ──
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
</script>
</body>
</html>
