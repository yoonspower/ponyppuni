<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게이밍 패드 - 데모 미리보기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #000;
  overflow: hidden;
  font-family: -apple-system, 'Malgun Gothic', sans-serif;
  width: 100vw; height: 100vh;
}

/* ── 가짜 게임 화면 (RPG 느낌) ── */
#game-screen {
  position: fixed; inset: 0;
  background: linear-gradient(180deg, #1a3a5c 0%, #2d5a27 40%, #3d6b2e 60%, #2a4a1e 100%);
  overflow: hidden;
}

/* 하늘 */
.sky {
  position: absolute; top: 0; left: 0; right: 0; height: 40%;
  background: linear-gradient(180deg, #0a1628 0%, #1a3a5c 60%, #3a6a8c 100%);
}
.star {
  position: absolute;
  width: 2px; height: 2px;
  background: #fff;
  border-radius: 50%;
}
.moon {
  position: absolute;
  top: 8%; right: 15%;
  width: 60px; height: 60px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 40%, #ffeedd, #ddc080);
  box-shadow: 0 0 40px rgba(255,238,200,0.4);
}

/* 땅 */
.ground {
  position: absolute; bottom: 0; left: 0; right: 0; height: 60%;
  background: linear-gradient(180deg, #3d6b2e 0%, #2d5a27 30%, #1e4018 100%);
}
.path {
  position: absolute;
  bottom: 0; left: 35%; right: 35%;
  height: 100%;
  background: linear-gradient(180deg, rgba(139,119,80,0.3) 0%, rgba(139,119,80,0.6) 100%);
  clip-path: polygon(40% 0%, 60% 0%, 80% 100%, 20% 100%);
}

/* 나무들 */
.tree {
  position: absolute;
  width: 40px;
  text-align: center;
  font-size: 36px;
  filter: brightness(0.7);
}

/* 캐릭터 */
.character {
  position: absolute;
  left: 50%; bottom: 35%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 5;
}
.char-body {
  font-size: 42px;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,0.5));
  animation: char-idle 1.5s ease-in-out infinite;
}
.char-name {
  margin-top: 4px;
  font-size: 11px;
  color: #fff;
  background: rgba(0,0,0,0.5);
  padding: 2px 8px;
  border-radius: 6px;
  display: inline-block;
}
.hp-bar {
  width: 60px; height: 6px;
  background: rgba(0,0,0,0.5);
  border-radius: 3px;
  margin: 4px auto 0;
  overflow: hidden;
}
.hp-fill {
  width: 75%; height: 100%;
  background: linear-gradient(90deg, #4caf50, #8bc34a);
  border-radius: 3px;
}

@keyframes char-idle {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-4px); }
}

/* 몬스터 */
.monster {
  position: absolute;
  text-align: center;
  z-index: 4;
  animation: monster-float 2s ease-in-out infinite;
}
.monster-emoji { font-size: 34px; }
.monster-hp {
  width: 40px; height: 4px;
  background: rgba(0,0,0,0.5);
  border-radius: 2px;
  margin: 2px auto 0;
  overflow: hidden;
}
.monster-hp-fill {
  height: 100%;
  background: linear-gradient(90deg, #f44336, #ff9800);
  border-radius: 2px;
}

@keyframes monster-float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* 게임 UI (HP, MP 등) */
.game-hud {
  position: absolute;
  top: 12px; left: 12px;
  z-index: 6;
}
.hud-bar {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 4px;
}
.hud-label {
  font-size: 11px; font-weight: 700;
  color: #fff;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  width: 24px;
}
.hud-track {
  width: 120px; height: 10px;
  background: rgba(0,0,0,0.6);
  border-radius: 5px;
  border: 1px solid rgba(255,255,255,0.15);
  overflow: hidden;
}
.hud-fill-hp { width: 75%; height: 100%; background: linear-gradient(90deg, #e53935, #ef5350); }
.hud-fill-mp { width: 60%; height: 100%; background: linear-gradient(90deg, #1e88e5, #42a5f5); }
.hud-fill-sp { width: 90%; height: 100%; background: linear-gradient(90deg, #fdd835, #ffee58); }
.hud-val {
  font-size: 10px; color: rgba(255,255,255,0.7);
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
}

/* 미니맵 */
.minimap {
  position: absolute;
  top: 12px; right: 12px;
  width: 80px; height: 80px;
  background: rgba(0,0,0,0.6);
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  z-index: 6;
  overflow: hidden;
}
.minimap-dot {
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: #4caf50;
  box-shadow: 0 0 4px #4caf50;
}
.minimap-enemy {
  position: absolute;
  width: 3px; height: 3px;
  border-radius: 50%;
  background: #f44336;
  box-shadow: 0 0 3px #f44336;
}

/* ============================================ */
/* ── 반투명 게임패드 오버레이 ── */
/* ============================================ */
#gamepad-overlay {
  position: fixed; inset: 0;
  z-index: 10;
  pointer-events: none;
}

/* ── 조이스틱 (왼쪽) ── */
.joy-base {
  position: absolute;
  left: 30px; bottom: 30px;
  width: 150px; height: 150px;
  border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,0.3);
  background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.03) 70%, transparent 100%);
  opacity: 0.7;
}
.joy-thumb {
  position: absolute;
  left: 30px; bottom: 30px;
  width: 150px; height: 150px;
}
.joy-thumb-inner {
  position: absolute;
  width: 52px; height: 52px;
  left: 30%; top: 25%;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, rgba(255,255,255,0.4), rgba(255,255,255,0.15));
  border: 2px solid rgba(255,255,255,0.4);
  box-shadow: 0 0 20px rgba(255,255,255,0.2);
  opacity: 0.8;
}
.joy-dir {
  position: absolute;
  color: rgba(255,255,255,0.08);
  font-size: 14px; font-weight: 900;
}
.joy-dir.u { left: 30px; bottom: 155px; width: 150px; text-align: center; }
.joy-dir.d { left: 30px; bottom: 5px; width: 150px; text-align: center; }
.joy-dir.l { left: 22px; bottom: 95px; }
.joy-dir.r { left: 162px; bottom: 95px; }
.joy-dir.active { color: rgba(255,255,255,0.5); }

/* ── ABXY 버튼 (오른쪽) ── */
.abxy-group {
  position: absolute;
  right: 30px; bottom: 30px;
  width: 160px; height: 160px;
}
.abxy {
  position: absolute;
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 900;
  color: rgba(255,255,255,0.5);
  opacity: 0.65;
}
.abxy-a {
  bottom: 0; left: 50%; transform: translateX(-50%);
  background: rgba(16,124,16,0.5);
  border: 2px solid rgba(16,124,16,0.4);
}
.abxy-b {
  right: 0; top: 50%; transform: translateY(-50%);
  background: rgba(176,36,24,0.5);
  border: 2px solid rgba(176,36,24,0.4);
}
.abxy-x {
  left: 0; top: 50%; transform: translateY(-50%);
  background: rgba(0,80,200,0.5);
  border: 2px solid rgba(0,80,200,0.4);
}
.abxy-y {
  top: 0; left: 50%; transform: translateX(-50%);
  background: rgba(200,160,0,0.5);
  border: 2px solid rgba(200,160,0,0.4);
}
.abxy.pressed {
  opacity: 0.6;
  filter: brightness(1.4);
}

/* ── 트리거 (상단) ── */
.trigger {
  position: absolute;
  top: 10px;
  width: 64px; height: 28px;
  border-radius: 14px;
  border: 1.5px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  color: rgba(255,255,255,0.3);
  opacity: 0.65;
}
.trigger-lb { left: 20px; }
.trigger-lt { left: 100px; }
.trigger-rb { right: 20px; }
.trigger-rt { right: 100px; }

/* ── 특수 버튼 (가운데 상단) ── */
.special-group {
  position: absolute;
  top: 10px;
  left: 50%; transform: translateX(-50%);
  display: flex; gap: 16px;
}
.special {
  width: 36px; height: 22px;
  border-radius: 11px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 600;
  color: rgba(255,255,255,0.2);
  opacity: 0.65;
}

/* ── D-Pad ── */
.dpad-group {
  position: absolute;
  left: 210px; bottom: 40px;
  width: 90px; height: 90px;
  opacity: 0.65;
}
.dpad {
  position: absolute;
  width: 30px; height: 30px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  color: rgba(255,255,255,0.3);
}
.dpad-u { top: 0; left: 50%; transform: translateX(-50%); border-radius: 6px 6px 2px 2px; }
.dpad-d { bottom: 0; left: 50%; transform: translateX(-50%); border-radius: 2px 2px 6px 6px; }
.dpad-l { left: 0; top: 50%; transform: translateY(-50%); border-radius: 6px 2px 2px 6px; }
.dpad-r { right: 0; top: 50%; transform: translateY(-50%); border-radius: 2px 6px 6px 2px; }

/* ── 토글 버튼 ── */
.toggle-btn {
  position: absolute;
  bottom: 8px; left: 50%; transform: translateX(-50%);
  width: 42px; height: 26px;
  border-radius: 8px;
  background: rgba(30,120,30,0.5);
  border: 1.5px solid rgba(80,200,80,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  color: rgba(255,255,255,0.6);
  opacity: 0.7;
}

/* ── LS RS ── */
.stick-btn {
  position: absolute;
  bottom: 8px;
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700;
  color: rgba(255,255,255,0.2);
  opacity: 0.65;
}
.stick-ls { left: 42%; }
.stick-rs { right: 42%; }

/* ── 안내 텍스트 ── */
.demo-label {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 20;
  pointer-events: none;
}
.demo-title {
  font-size: 20px; font-weight: 800;
  color: rgba(255,255,255,0.8);
  text-shadow: 0 2px 10px rgba(0,0,0,0.8);
  margin-bottom: 8px;
}
.demo-sub {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  line-height: 1.6;
}

/* 조이스틱 움직임 애니메이션 (데모용) */
@keyframes joy-move {
  0% { left: 30%; top: 25%; }
  20% { left: 15%; top: 25%; }
  40% { left: 15%; top: 45%; }
  60% { left: 50%; top: 45%; }
  80% { left: 50%; top: 15%; }
  100% { left: 30%; top: 25%; }
}
.joy-thumb-inner {
  animation: joy-move 4s ease-in-out infinite;
}

/* A버튼 깜빡임 (누르는 효과) */
@keyframes btn-press {
  0%, 70%, 100% { opacity: 0.3; filter: none; }
  75%, 95% { opacity: 0.6; filter: brightness(1.4); }
}
.abxy-a { animation: btn-press 3s ease infinite; }
</style>
</head>
<body>

<!-- 게임 화면 -->
<div id="game-screen">
  <!-- 하늘 -->
  <div class="sky">
    <div class="moon"></div>
  </div>

  <!-- 땅 -->
  <div class="ground">
    <div class="path"></div>
  </div>

  <!-- 나무들 -->
  <div class="tree" style="left:8%; bottom:42%">🌲</div>
  <div class="tree" style="left:18%; bottom:48%">🌳</div>
  <div class="tree" style="right:12%; bottom:45%">🌲</div>
  <div class="tree" style="right:22%; bottom:50%">🌳</div>
  <div class="tree" style="left:5%; bottom:55%">🌲</div>
  <div class="tree" style="right:8%; bottom:58%">🌳</div>

  <!-- 캐릭터 -->
  <div class="character">
    <div class="char-body">🧙</div>
    <div class="char-name">Player1</div>
    <div class="hp-bar"><div class="hp-fill"></div></div>
  </div>

  <!-- 몬스터들 -->
  <div class="monster" style="left:30%; bottom:45%">
    <div class="monster-emoji">🐺</div>
    <div class="monster-hp"><div class="monster-hp-fill" style="width:60%"></div></div>
  </div>
  <div class="monster" style="right:25%; bottom:50%; animation-delay: 0.5s;">
    <div class="monster-emoji">🦇</div>
    <div class="monster-hp"><div class="monster-hp-fill" style="width:90%"></div></div>
  </div>
  <div class="monster" style="left:20%; bottom:55%; animation-delay: 1s;">
    <div class="monster-emoji">💀</div>
    <div class="monster-hp"><div class="monster-hp-fill" style="width:35%"></div></div>
  </div>

  <!-- 게임 HUD -->
  <div class="game-hud">
    <div class="hud-bar">
      <span class="hud-label">HP</span>
      <div class="hud-track"><div class="hud-fill-hp"></div></div>
      <span class="hud-val">750/1000</span>
    </div>
    <div class="hud-bar">
      <span class="hud-label">MP</span>
      <div class="hud-track"><div class="hud-fill-mp"></div></div>
      <span class="hud-val">300/500</span>
    </div>
    <div class="hud-bar">
      <span class="hud-label">SP</span>
      <div class="hud-track"><div class="hud-fill-sp"></div></div>
      <span class="hud-val">45/50</span>
    </div>
  </div>

  <!-- 미니맵 -->
  <div class="minimap">
    <div class="minimap-dot"></div>
    <div class="minimap-enemy" style="top:30%; left:35%"></div>
    <div class="minimap-enemy" style="top:60%; left:70%"></div>
    <div class="minimap-enemy" style="top:45%; left:25%"></div>
  </div>
</div>

<!-- 반투명 게임패드 오버레이 -->
<div id="gamepad-overlay">
  <!-- 조이스틱 -->
  <div class="joy-base"></div>
  <div class="joy-thumb">
    <div class="joy-thumb-inner"></div>
  </div>
  <div class="joy-dir u active">▲</div>
  <div class="joy-dir d">▼</div>
  <div class="joy-dir l active">◀</div>
  <div class="joy-dir r">▶</div>

  <!-- ABXY -->
  <div class="abxy-group">
    <div class="abxy abxy-a">A</div>
    <div class="abxy abxy-b">B</div>
    <div class="abxy abxy-x">X</div>
    <div class="abxy abxy-y">Y</div>
  </div>

  <!-- 트리거 -->
  <div class="trigger trigger-lb">LB</div>
  <div class="trigger trigger-lt">LT</div>
  <div class="trigger trigger-rb">RB</div>
  <div class="trigger trigger-rt">RT</div>

  <!-- 특수 버튼 -->
  <div class="special-group">
    <div class="special">SEL</div>
    <div class="special">STA</div>
  </div>

  <!-- D-Pad -->
  <div class="dpad-group">
    <div class="dpad dpad-u">▲</div>
    <div class="dpad dpad-d">▼</div>
    <div class="dpad dpad-l">◀</div>
    <div class="dpad dpad-r">▶</div>
  </div>

  <!-- 토글 -->
  <div class="toggle-btn">ON</div>

  <!-- LS RS -->
  <div class="stick-btn stick-ls">LS</div>
  <div class="stick-btn stick-rs">RS</div>
</div>

<!-- 안내 -->
<div class="demo-label">
  <div class="demo-title">실제 게임 화면에 이렇게 보입니다</div>
  <div class="demo-sub">
    반투명 게임패드가 게임 위에 겹쳐서 표시됩니다<br>
    터치하면 살짝 밝아지고, 손 떼면 다시 흐려집니다<br>
    조이스틱이 움직이는 것은 데모 애니메이션입니다
  </div>
</div>

<script>
// 별 생성
var sky = document.querySelector('.sky');
for (var i = 0; i < 40; i++) {
  var star = document.createElement('div');
  star.className = 'star';
  star.style.left = Math.random() * 100 + '%';
  star.style.top = Math.random() * 80 + '%';
  star.style.opacity = Math.random() * 0.7 + 0.3;
  sky.appendChild(star);
}
</script>
</body>
</html>
