<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포니쁘니 - 핸드폰 기종 확인</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(160deg, #ff6b9d 0%, #c850c0 50%, #4158d0 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, 'Malgun Gothic', sans-serif;
    padding: 20px;
  }

  /* 상단 로고 */
  .shop-header {
    text-align: center;
    margin-bottom: 16px;
  }
  .shop-logo {
    font-size: 42px;
    margin-bottom: 6px;
  }
  .shop-name {
    font-size: 28px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 2px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .shop-tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.8);
    margin-top: 4px;
  }

  /* 메인 카드 */
  .card {
    background: #fff;
    border-radius: 28px;
    padding: 32px 24px 26px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.3);
  }
  .card-top { text-align: center; margin-bottom: 22px; }
  .card-top .icon { font-size: 52px; margin-bottom: 8px; }
  .card-top h1 { font-size: 20px; font-weight: 800; color: #2d2d2d; margin-bottom: 3px; }
  .card-top p  { font-size: 13px; color: #bbb; }

  /* 결과 카드 - 삼성 */
  .result-card {
    border-radius: 20px;
    padding: 22px 20px;
    margin-bottom: 16px;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .samsung-bg { background: linear-gradient(135deg, #1428A0, #0B52CE); }
  .apple-bg   { background: linear-gradient(135deg, #1c1c1e, #48484a); }
  .result-card::after {
    position: absolute; bottom: -10px; right: 12px;
    font-size: 36px; font-weight: 900;
    opacity: .07; letter-spacing: 2px;
  }
  .samsung-bg::after { content: 'SAMSUNG'; }
  .apple-bg::after   { content: 'APPLE'; }
  .rl { font-size: 12px; opacity: .7; margin-bottom: 8px; }
  .rm { font-size: 28px; font-weight: 900; line-height: 1.2; word-break: keep-all; }
  .rs { font-size: 12px; opacity: .55; margin-top: 6px; }

  /* 상세 정보 */
  .info-box {
    background: #f8f6ff;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 13px 16px;
    border-bottom: 1px solid #ede9fe;
    font-size: 14px;
  }
  .info-row:last-child { border-bottom: none; }
  .ik { color: #888; }
  .iv { color: #111; font-weight: 700; }

  /* 아이폰 선택 버튼 */
  #iphonePicker { display: none; }
  .picker-title { font-size: 15px; font-weight: 700; color: #333; text-align: center; margin-bottom: 6px; }
  .picker-sub   { font-size: 13px; color: #999; text-align: center; margin-bottom: 14px; line-height: 1.5; }
  .pick-btn {
    display: block; width: 100%;
    background: #f8f6ff;
    border: 2px solid #e0d9ff;
    border-radius: 14px;
    padding: 15px;
    margin-bottom: 10px;
    font-size: 17px; font-weight: 700;
    color: #4158d0;
    cursor: pointer;
    transition: all .15s;
  }
  .pick-btn:active, .pick-btn:hover {
    background: #4158d0; color: #fff; border-color: #4158d0;
  }

  /* 경고 */
  #notSamsung { display: none; }
  .warn-box {
    background: #fff8e1; border: 2px solid #ffc107;
    border-radius: 16px; padding: 24px; text-align: center; margin-bottom: 16px;
  }
  .wi { font-size: 44px; margin-bottom: 10px; }
  .wt { font-size: 17px; font-weight: 800; color: #856404; margin-bottom: 6px; }
  .wd { font-size: 14px; color: #6c5a00; line-height: 1.6; }

  /* 하단 */
  .footer {
    text-align: center;
    margin-top: 18px;
  }
  .footer .shop-badge {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 20px;
    padding: 8px 20px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .notice { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 10px; text-align: center; }
</style>

<body>

  <!-- 가게 로고 -->
  <div class="shop-header">
    <div class="shop-name">포니쁘니</div>
    <div class="shop-tagline">📱 핸드폰 기종 확인 서비스</div>
  </div>

  <!-- 메인 카드 -->
  <div class="card">
    <div class="card-top">
      <div class="icon">📱</div>
      <h1>내 핸드폰 기종 확인</h1>
      <p>자동으로 기종을 확인해 드려요</p>
    </div>

    <!-- 삼성 결과 -->
    <div id="samsungResult" style="display:none">
      <div class="result-card samsung-bg">
        <div class="rl">📋 기종명</div>
        <div class="rm" id="sModel">-</div>
        <div class="rs" id="sCode"></div>
      </div>
      <div class="info-box">
        <div class="info-row"><span class="ik">⚙️ 안드로이드 버전</span><span class="iv" id="sOs">-</span></div>
        <div class="info-row"><span class="ik">📐 화면 해상도</span><span class="iv" id="sScreen">-</span></div>
      </div>
    </div>

    <!-- 아이폰 결과 + 선택 -->
    <div id="iphonePicker" style="display:none">
      <div class="result-card apple-bg">
        <div class="rl">📋 기종명</div>
        <div class="rm" id="iModel">확인 중...</div>
        <div class="rs" id="iSub"></div>
      </div>

      </div>
      <div id="pickerSection" style="display:none">
        <div class="picker-title">🤔 비슷한 기종이 여럿 있어요</div>
        <div class="picker-sub">아래에서 내 기종을 직접 골라주세요!<br>한 번만 탭하면 돼요 😊</div>
        <div id="pickerBtns"></div>
      </div>
    </div>

    <!-- 갤럭시·아이폰 아님 -->
    <div id="notSamsung" style="display:none">
      <div class="warn-box">
        <div class="wi">⚠️</div>
        <div class="wt" id="warnTitle">스마트폰에서 열어주세요</div>
        <div class="wd" id="warnDesc">삼성 갤럭시 또는 아이폰에서 열어주세요.</div>
      </div>
    </div>

  </div>

  <!-- 하단 가게 배지 -->
  <div class="footer">
    <div class="shop-badge">📱 포니쁘니</div>
    <div class="notice">🔒 개인정보는 수집·저장되지 않습니다</div>

    }

    if (!cands) {
      txt('iModel', "아이폰 ("+pw+"×"+ph+")");
      txt('iSub', "목록에 없는 기종이에요");
    } else if (cands.length===1) {
      txt('iModel', cands[0]);
    } else {
      txt('iModel', cands[0]);
      txt('iSub', "아래에서 정확한 기종을 골라주세요 👇");
      var sec = document.getElementById('pickerSection');
      var btns = document.getElementById('pickerBtns');
      sec.style.display='block';
      cands.forEach(function(name){
        var btn = document.createElement('button');
        btn.className='pick-btn';
        btn.textContent=name;
        btn.onclick=function(){
          txt('iModel',name);
          txt('iSub','✅ 선택 완료!');
          sec.style.display='none';
        };
        btns.appendChild(btn);
      });
    }

  } else {
    show('notSamsung');
    if (/Android/.test(ua)) {
      txt('warnTitle','삼성 갤럭시가 아닌 안드로이드예요');
      txt('warnDesc','이 페이지는 삼성 갤럭시와 아이폰 전용이에요.');
    } else {
      txt('warnTitle','스마트폰에서 열어주세요');
      txt('warnDesc','PC나 태블릿에서는 확인이 어려워요.\n핸드폰으로 다시 열어주세요.');
    }
  }
})();
</script>
</body>
</html>
