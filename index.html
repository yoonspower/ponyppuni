/* ===== 원티드(Wanted) 스타일: 흰 배경 · 비비드 블루 · Pretendard ===== */
:root{
  --blue:#3366FF; --blue-dark:#2A52E0; --blue-tint:#EAF0FF;
  --bg:#F4F5F7; --card:#FFFFFF; --text:#21272A; --sub:#868E96; --border:#E9ECEF;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Pretendard',-apple-system,'Malgun Gothic',sans-serif;color:var(--text);padding:24px 18px}
.top{text-align:center;margin-bottom:18px}
.shop-name{font-size:24px;font-weight:800;color:var(--text);letter-spacing:-0.6px}
.shop-sub{font-size:14px;color:var(--sub);margin-top:6px;font-weight:500}
.card{background:var(--card);border-radius:20px;padding:28px 22px 24px;width:100%;max-width:400px;
  box-shadow:0 4px 24px rgba(33,39,42,.07);border:1px solid #EEF0F3}
.card-top{text-align:center;margin-bottom:20px}
.card-top .icon{display:inline-flex;align-items:center;justify-content:center;width:62px;height:62px;
  background:var(--blue-tint);border-radius:18px;font-size:30px;margin-bottom:12px}
.card-top h1{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-0.5px;margin-bottom:4px}
.card-top p{font-size:14px;color:var(--sub);font-weight:500}
/* 결과 카드: 원티드 톤의 연한 틴트 + 진한 텍스트 */
.result-card{border-radius:16px;padding:22px 20px;margin-bottom:14px}
.samsung-bg{background:var(--blue-tint)}
.apple-bg{background:#F1F3F5}
.rl{font-size:12px;font-weight:700;color:var(--blue);letter-spacing:.2px;margin-bottom:8px}
.apple-bg .rl{color:#495057}
.rm{font-size:26px;font-weight:800;color:var(--text);line-height:1.25;letter-spacing:-0.5px;word-break:keep-all}
.rs{font-size:13px;color:var(--sub);margin-top:8px;font-weight:500}
.info-box{background:#F8F9FA;border:1px solid #F1F3F5;border-radius:14px;overflow:hidden;margin-bottom:14px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #F1F3F5;font-size:14px}
.info-row:last-child{border-bottom:none}
.ik{color:var(--sub);font-weight:500}.iv{color:var(--text);font-weight:700}
.pick-title{font-size:15px;font-weight:700;color:var(--text);text-align:center;margin:6px 0 6px}
.pick-sub{font-size:13px;color:var(--sub);text-align:center;margin-bottom:14px;line-height:1.5}
.pick-btn{display:block;width:100%;background:#fff;border:1.5px solid var(--border);border-radius:14px;
  padding:14px 16px;margin-bottom:10px;text-align:left;cursor:pointer;transition:border-color .15s,background .15s}
.pick-btn .pn{display:block;font-size:16px;font-weight:700;color:var(--text)}
.pick-btn .ph{display:block;font-size:12.5px;font-weight:500;color:var(--sub);margin-top:3px}
.pick-btn:active,.pick-btn:hover{border-color:var(--blue);background:#F5F8FF}
.warn-box{background:#F8F9FA;border:1px solid var(--border);border-radius:16px;padding:28px 20px;text-align:center}
.wi{font-size:40px;margin-bottom:12px}
.wt{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-0.5px;margin-bottom:8px}
.wd{font-size:14px;color:var(--sub);line-height:1.6}
.open-btn{display:block;width:100%;background:var(--blue);border:none;border-radius:12px;padding:15px;margin-top:16px;
  font-size:16px;font-weight:700;color:#fff;cursor:pointer}
.open-btn:active{background:var(--blue-dark)}
.footer{text-align:center;margin-top:18px}
.badge{display:inline-block;background:#fff;border:1px solid var(--border);border-radius:999px;padding:8px 18px;
  color:#495057;font-size:13px;font-weight:600}
.notice{font-size:12px;color:#ADB5BD;margin-top:10px}
</style>
</head>

<div class="top">

  var code = m ? 'SM-'+m[1] : '';
  var code4 = code.substring(0,7);
  var name = (code && SM[code4]) ? SM[code4] : (code ? '삼성 갤럭시 ('+code+')' : '삼성 갤럭시');
  var av = ua.match(/Android ([\d.]+)/);
  var os = av ? '안드로이드 '+av[1] : '-';
  out.innerHTML = makeResult('samsung-bg', name, code ? '모델코드: '+code : '', os, screen.width+'×'+screen.height);

} else if (/iPhone/.test(ua)) {
  var vm = ua.match(/OS (\d+)_(\d+)/);
  var ios = vm ? parseInt(vm[1], 10) : 0;
  var iosStr = vm ? 'iOS '+vm[1]+'.'+vm[2] : 'iOS';
  var dpr = window.devicePixelRatio || 2;
  var pw = Math.round(Math.min(screen.width, screen.height) * dpr);
  var ph = Math.round(Math.max(screen.width, screen.height) * dpr);
  var keyRes = pw + 'x' + ph;
  var screenStr = screen.width + '×' + screen.height;

  // 1) 물리 해상도로 후보 추출
  var keys = IP[keyRes] ? IP[keyRes].slice(0) : null;
  // 2) iOS 버전으로 불가능한(기기 출시 iOS보다 낮은) 후보 제거
  if (keys && ios > 0) {
    var filtered = [];
    for (var i = 0; i < keys.length; i++) {
      if (M[keys[i]] && ios >= M[keys[i]].min) filtered.push(keys[i]);
    }
    if (filtered.length) keys = filtered;
  }

  if (keys && keys.length === 1) {
    // 정확히 한 기종으로 확정
    out.innerHTML = makeResult('apple-bg', M[keys[0]].n, hintLine(keys[0]), iosStr, screenStr);
  } else if (keys && keys.length > 1) {
    // 화면이 같은 기종이 여럿 → 힌트 보고 원탭 확정
    out.innerHTML = makeResult('apple-bg', '아이폰', '아래에서 내 기종을 골라주세요 👇', iosStr, screenStr)
      + pickerHtml('🤔 화면이 같은 기종이 여럿 있어요', '카메라·크기 힌트를 보고 한 번만 탭하세요 😊', keys);
  } else {
    // 해상도 매칭 실패(디스플레이 확대/축소 등) → 직접 선택
    out.innerHTML = makeResult('apple-bg', '아이폰', '아래에서 내 기종을 직접 골라주세요 👇', iosStr, screenStr)
      + pickerHtml('📱 아이폰 기종을 골라주세요', '설정의 화면 확대/축소 때문에 자동 감지가 어려워요', allKeys(ios));
  }

} else if (/Android/.test(ua)) {
  if (isInApp) {
    out.innerHTML = '<div class="warn-box">'
      +'<div class="wi">⚠️</div>'
      +'<div class="wt">브라우저로 열어주세요</div>'
      +'<div class="wd">카카오톡 등 앱 안에서는 기종 감지가 어려울 수 있어요.<br>아래 버튼을 눌러 기본 브라우저로 열어주세요!</div>'
      +'<button class="open-btn" onclick="location.href=location.href">🌐 브라우저로 열기</button>'
      +'</div>';
  } else {
    out.innerHTML = '<div class="warn-box">'
      +'<div class="wi">⚠️</div>'
      +'<div class="wt">삼성 갤럭시가 아닌 기기예요</div>'
      +'<div class="wd">삼성 갤럭시 또는 아이폰에서 열어주세요.</div>'
      +'</div>';
  }
} else {
  out.innerHTML = '<div class="warn-box">'
    +'<div class="wi">📱</div>'
    +'<div class="wt">핸드폰에서 열어주세요</div>'
    +'<div class="wd">PC나 태블릿에서는 기종을 확인할 수 없어요.</div>'
    +'</div>';
}

// ── 아이폰 선택 UI 헬퍼 (모든 브라우저 호환: ES5, 인라인 onclick) ──
function lensTxt(l){ return l >= 3 ? '카메라 3개' : (l === 2 ? '카메라 2개' : '카메라 1개'); }

function hintLine(k){ var m = M[k]; return m ? (m.y + '년 · ' + m.s + ' · ' + lensTxt(m.l)) : ''; }

function escq(s){ return String(s).replace(/'/g, "\\'"); }

function pickBtn(k){
  var m = M[k];
  if (!m) return '';
  return '<button type="button" class="pick-btn" onclick="sel(this,\'' + escq(m.n) + '\')">'
    + '<span class="pn">' + m.n + '</span>'
    + '<span class="ph">' + m.y + '년 · ' + m.s + ' · ' + lensTxt(m.l) + '</span>'
    + '</button>';
}

function pickerHtml(title, sub, keys){
  var h = '<div class="pick-title">' + title + '</div><div class="pick-sub">' + sub + '</div>';
  for (var i = 0; i < keys.length; i++) h += pickBtn(keys[i]);
  return h;
}

// iOS 버전으로 가볍게 거른 전체 후보(최신순)
function allKeys(ios){
  var r = [];
  for (var i = 0; i < IP_ALL.length; i++){
    var m = M[IP_ALL[i]];
    if (m && (ios === 0 || ios >= m.min)) r.push(IP_ALL[i]);
  }
  return r;
}

// 선택지(피커)만 제거하고 확정된 기종명만 남긴다
function removePicker(){
  var btns = document.querySelectorAll('.pick-btn');
  for (var i = btns.length - 1; i >= 0; i--) btns[i].parentNode.removeChild(btns[i]);
  var rest = ['.pick-title', '.pick-sub'];
  for (var s = 0; s < rest.length; s++){
    var el = document.querySelector(rest[s]);
    if (el) el.parentNode.removeChild(el);
  }
}

function sel(btn, name){
  var nm = document.getElementById('modelNm');
  if (nm) nm.textContent = name;
  var sub = document.getElementById('modelSub');
  if (sub) sub.textContent = '✅ 선택 완료!';
  removePicker();
}
</script>
