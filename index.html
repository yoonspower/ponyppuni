<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포니쁘니 - 핸드폰 기종 확인</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(160deg,#1a1a6e,#c850c0);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,'Malgun Gothic',sans-serif;padding:20px}
.top{text-align:center;margin-bottom:16px}
.shop-name{font-size:32px;font-weight:900;color:#fff;letter-spacing:2px}
.shop-sub{font-size:14px;color:rgba(255,255,255,.8);margin-top:4px}
.card{background:#fff;border-radius:28px;padding:32px 24px 28px;width:100%;max-width:400px;box-shadow:0 30px 60px rgba(0,0,0,.3)}
.card-top{text-align:center;margin-bottom:22px}
.card-top .icon{font-size:52px;margin-bottom:8px}
.card-top h1{font-size:20px;font-weight:800;color:#2d2d2d;margin-bottom:3px}
.card-top p{font-size:13px;color:#bbb}
.result-card{border-radius:20px;padding:22px 20px;margin-bottom:16px;color:#fff}
.samsung-bg{background:linear-gradient(135deg,#1428A0,#0B52CE)}
.apple-bg{background:linear-gradient(135deg,#1c1c1e,#48484a)}
.rl{font-size:12px;opacity:.7;margin-bottom:8px}
.rm{font-size:28px;font-weight:900;line-height:1.2;word-break:keep-all}
.rs{font-size:12px;opacity:.55;margin-top:6px}
.info-box{background:#f8f6ff;border-radius:16px;overflow:hidden;margin-bottom:16px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid #ede9fe;font-size:14px}
.info-row:last-child{border-bottom:none}
.ik{color:#888}.iv{color:#111;font-weight:700}
.pick-title{font-size:15px;font-weight:700;color:#333;text-align:center;margin-bottom:6px}
.pick-sub{font-size:13px;color:#999;text-align:center;margin-bottom:14px;line-height:1.5}
.pick-btn{display:block;width:100%;background:#f8f6ff;border:2px solid #e0d9ff;border-radius:14px;padding:15px;margin-bottom:10px;font-size:17px;font-weight:700;color:#4158d0;cursor:pointer}
.warn-box{background:#fff8e1;border:2px solid #ffc107;border-radius:16px;padding:24px;text-align:center;margin-bottom:16px}
.wi{font-size:44px;margin-bottom:10px}
.wt{font-size:17px;font-weight:800;color:#856404;margin-bottom:6px}
.wd{font-size:14px;color:#6c5a00;line-height:1.6}
.open-btn{display:block;width:100%;background:linear-gradient(135deg,#1428A0,#0B52CE);border:none;border-radius:14px;padding:16px;margin-top:14px;font-size:17px;font-weight:700;color:#fff;cursor:pointer}
.footer{text-align:center;margin-top:18px}
.badge{display:inline-block;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:8px 20px;color:#fff;font-size:14px;font-weight:700}
.notice{font-size:11px;color:rgba(255,255,255,.6);margin-top:10px;text-align:center}
</style>

  <div class="notice">🔒 개인정보는 수집·저장되지 않습니다</div>

  "SM-J610":"갤럭시 J6+","SM-J600":"갤럭시 J6",
  "SM-J530":"갤럭시 J5 Pro","SM-J510":"갤럭시 J5 (2016)","SM-J500":"갤럭시 J5",
  "SM-J415":"갤럭시 J4+","SM-J410":"갤럭시 J4 Core","SM-J400":"갤럭시 J4",
  "SM-J330":"갤럭시 J3 Pro","SM-J320":"갤럭시 J3 (2016)","SM-J310":"갤럭시 J3 (2015)","SM-J300":"갤럭시 J3",
  "SM-J260":"갤럭시 J2 Core","SM-J250":"갤럭시 J2 Pro","SM-J200":"갤럭시 J2",
  "SM-J120":"갤럭시 J1 (2016)","SM-J110":"갤럭시 J1 Ace","SM-J100":"갤럭시 J1",

  // ── M시리즈 ───────────────────────────────────

  // ── XCover ────────────────────────────────────

  // ── 퀀텀 ──────────────────────────────────────

// ── 아이폰 해상도+iOS 버전 매핑 ─────────────────
var IP = {
  // 아이폰 16 시리즈
  "1320x2868":[18,99,["아이폰 16 Pro Max"]],
  "1206x2622":[18,99,["아이폰 16 Pro"]],
  "1179x2556_18":[18,99,["아이폰 16","아이폰 15 Pro"]],
  "1290x2796_18":[18,99,["아이폰 16 Plus","아이폰 15 Plus"]],
  // 아이폰 15 시리즈
  "1179x2556_17":[17,17,["아이폰 15 Pro"]],
  "1290x2796_17":[17,17,["아이폰 15 Plus","아이폰 14 Pro Max"]],
  // 아이폰 14 시리즈
  "1179x2556_0":[0,16,["아이폰 14 Pro"]],
  "1290x2796_0":[0,16,["아이폰 14 Pro Max"]],

  // 아이폰 13 시리즈
  "1170x2532_0":[0,16,["아이폰 13"]],
  "1080x2340_15":[15,99,["아이폰 13 mini"]],
  "1284x2778_15":[15,99,["아이폰 13 Pro Max"]],
  "1170x2532_15":[15,15,["아이폰 13 Pro","아이폰 13"]],
  // 아이폰 12 시리즈

  // 아이폰 11 시리즈

function makeResult(bgClass, modelName, modelCode, osStr, screenStr) {
  return '<div class="result-card '+bgClass+'">'
    +'<div class="rl">📋 기종명</div>'
    +'<div class="rm" id="modelNm">'+modelName+'</div>'
    +(modelCode?'<div class="rs" id="modelSub">'+modelCode+'</div>':'<div class="rs" id="modelSub"></div>')
    +'</div>'
    +'<div class="info-box">'
    +'<div class="info-row"><span class="ik">⚙️ 운영체제</span><span class="iv">'+osStr+'</span></div>'
    +'<div class="info-row"><span class="ik">📐 화면 해상도</span><span class="iv">'+screenStr+'</span></div>'
    +'</div>';
}

// 삼성 감지 (카카오톡 인앱브라우저 포함)
var isSamsung = /SM-[A-Z0-9]/.test(ua) || /SamsungBrowser/.test(ua);
var isInApp = /KAKAO|NAVER|Instagram|FB_IAB|Line/i.test(ua);

if (isSamsung) {
  var m = ua.match(/SM-([A-Z0-9]+)/);
  var code = m ? 'SM-'+m[1] : '';
  var code4 = code.substring(0,7);
  var name = (code && SM[code4]) ? SM[code4] : (code ? '삼성 갤럭시 ('+code+')' : '삼성 갤럭시');
  var av = ua.match(/Android ([\d.]+)/);
  var os = av ? '안드로이드 '+av[1] : '-';
  out.innerHTML = makeResult('samsung-bg', name, code ? '모델코드: '+code : '', os, screen.width+'×'+screen.height);

} else if (/iPhone/.test(ua)) {
  var vm = ua.match(/OS (\d+)_(\d+)/);
  var ios = vm ? parseInt(vm[1]) : 0;
  var iosStr = vm ? 'iOS '+vm[1]+'.'+vm[2] : 'iOS';
  var pw = Math.round(Math.min(screen.width,screen.height)*devicePixelRatio);
  var ph = Math.round(Math.max(screen.width,screen.height)*devicePixelRatio);
  var base = pw+'x'+ph;
  var cands = null;
  var suffixes = ['_'+ios,'_18','_17','_15','_14','_13','_10','_0',''];
  for (var i=0; i<suffixes.length; i++) {
    var key = base+suffixes[i];
    if (IP[key] && ios>=IP[key][0] && ios<=IP[key][1]) { cands=IP[key][2]; break; }
  }
  if (!cands) cands = ['아이폰 ('+pw+'×'+ph+')'];

  if (cands.length===1) {
    out.innerHTML = makeResult('apple-bg', cands[0], '', iosStr, screen.width+'×'+screen.height);
  } else {
    var html = makeResult('apple-bg', cands[0], '아래에서 정확한 기종을 골라주세요 👇', iosStr, screen.width+'×'+screen.height);
    html += '<div class="pick-title">🤔 비슷한 기종이 여럿 있어요</div>';
    html += '<div class="pick-sub">한 번만 탭하면 돼요 😊</div>';
    for (var j=0; j<cands.length; j++) {
      html += '<button class="pick-btn" onclick="sel(this,\''+cands[j]+'\')">'+cands[j]+'</button>';
    }
    out.innerHTML = html;
  }

} else if (/Android/.test(ua)) {
  if (isInApp) {
    out.innerHTML = '<div class="warn-box">'
      +'<div class="wi">⚠️</div>'
      +'<div class="wt">브라우저로 열어주세요</div>'
      +'<div class="wd">카카오톡 등 앱 안에서는 기종 감지가 어려울 수 있어요.<br>아래 버튼을 눌러 기본 브라우저로 열어주세요!</div>'
      +'<button class="open-btn" onclick="location.href=location.href">🌐 브라우저로 열기</button>'
      +'</div>';
  } else {
    out.innerHTML = '<div class="warn-box">'
      +'<div class="wi">⚠️</div>'
      +'<div class="wt">삼성 갤럭시가 아닌 기기예요</div>'
      +'<div class="wd">삼성 갤럭시 또는 아이폰에서 열어주세요.</div>'
      +'</div>';
  }
} else {
  out.innerHTML = '<div class="warn-box">'
    +'<div class="wi">📱</div>'
    +'<div class="wt">핸드폰에서 열어주세요</div>'
    +'<div class="wd">PC나 태블릿에서는 기종을 확인할 수 없어요.</div>'
    +'</div>';
}

function sel(btn, name) {
  document.getElementById('modelNm').textContent = name;
  var sub = document.getElementById('modelSub');
  if(sub) sub.textContent = '✅ 선택 완료!';
  btn.parentNode.remove();
}
</script>
</body>
</html>
