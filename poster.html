<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>포니쁘니 - QR 포스터 (A4 인쇄용)</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
<style>
  /* ===== A4 인쇄 설정 ===== */
  @page { size: A4 portrait; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0;
      -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  :root{ --blue:#3366FF; --blue-tint:#EAF0FF; --text:#21272A; --sub:#868E96; --border:#E9ECEF; }

  html, body { width: 210mm; height: 297mm; }
  /* 원티드 스타일: 흰 배경 + 비비드 블루 포인트 */
  body {
    font-family: 'Pretendard', -apple-system, 'Malgun Gothic', sans-serif;
    background: #FFFFFF; color: var(--text);
    display: flex; flex-direction: column; align-items: center;
    padding: 20mm 18mm 16mm;
  }

  /* ===== 브랜드 ===== */
  .brand { display: flex; align-items: center; gap: 4mm; margin-bottom: 12mm; }
  .brand .name { font-size: 9mm; font-weight: 800; letter-spacing: -0.5mm; }
  .brand .tag {
    font-size: 4.6mm; font-weight: 700; color: var(--blue);
    background: var(--blue-tint); border-radius: 999px; padding: 1.8mm 4mm;
  }

  /* ===== 헤드라인 ===== */
  .hero { text-align: center; margin-bottom: 11mm; }
  .hero h1 { font-size: 15mm; font-weight: 800; line-height: 1.3; letter-spacing: -0.6mm; }
  .hero h1 b { color: var(--blue); }
  .hero p { font-size: 6mm; font-weight: 600; color: var(--sub); margin-top: 5mm; }

  /* ===== QR 카드 ===== */
  .qr-card {
    background: #fff; border: 0.5mm solid var(--border); border-radius: 8mm;
    padding: 11mm 11mm 9mm; text-align: center;
    box-shadow: 0 3mm 14mm rgba(33,39,42,.08);
  }
  .qr-card img { width: 108mm; height: 108mm; display: block; margin: 0 auto; }
  .qr-cap {
    margin-top: 6mm; font-size: 7mm; font-weight: 800; color: #fff;
    background: var(--blue); border-radius: 999px; padding: 3.5mm 0; letter-spacing: -0.3mm;
  }

  /* ===== 사용법 ===== */
  .steps { width: 100%; max-width: 150mm; margin-top: 11mm; }
  .step { display: flex; align-items: center; gap: 5mm; padding: 4mm 0; }
  .step + .step { border-top: 0.4mm solid #F1F3F5; }
  .step .num {
    flex: none; width: 11mm; height: 11mm; line-height: 11mm; text-align: center;
    border-radius: 50%; background: var(--blue); color: #fff; font-size: 6mm; font-weight: 800;
  }
  .step .txt { font-size: 6mm; font-weight: 700; }

  /* ===== 하단 ===== */
  .foot { margin-top: auto; padding-top: 10mm; text-align: center; }
  .foot .pill {
    display: inline-block; background: var(--blue-tint); color: var(--blue);
    font-size: 5.5mm; font-weight: 800; padding: 3.5mm 10mm; border-radius: 999px;
  }
  .foot .sub { margin-top: 4mm; font-size: 4mm; color: var(--sub); font-weight: 500; }

  @media screen { body { box-shadow: 0 0 30px rgba(0,0,0,.15); margin: 20px auto; } }
</style>
</head>
<body>
  <div class="brand">
    <span class="name">포니쁘니</span>
    <span class="tag">핸드폰 기종 확인</span>

  <div class="hero">
    <h1>내 폰 기종이 <b>뭐였더라?</b><br>QR 찍으면 <b>바로 확인!</b></h1>

</body>
